name: CI/CD Pipeline

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_KEY: pip-${{ github.run_id }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # SECURITY (parallel with install)
  # ──────────────────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }

      - run: pip install -r requirements.txt

      - name: pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with: { inputs: requirements.txt, strict: true, summary: true }

  # ──────────────────────────────────────────────────────────────────────────────
  # INSTALL & VALIDATE
  # ──────────────────────────────────────────────────────────────────────────────
  install:
    name: 📦 Install & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (Ruff)
        run: |
          pip install ruff
          ruff check . --output-format=github || true

      - name: License Audit
        run: |
          pip install pip-licenses
          pip-licenses --format=markdown >> $GITHUB_STEP_SUMMARY
          pip-licenses --format=csv | grep -qiE "GPL|LGPL|AGPL" && exit 1 || true

      - name: Verify imports
        run: python -c "import fastapi; import groq; print('✓ Imports OK')"

  # ──────────────────────────────────────────────────────────────────────────────
  # TESTS
  # ──────────────────────────────────────────────────────────────────────────────
  test-agents:
    name: 🧪 Agent Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - run: pip install pytest pytest-cov groq
      - name: Run tests
        working-directory: src/extension/pythonTestingPipeline/scripts
        run: pytest pipeline/tests/test_agents.py -v --tb=short

  test-gui:
    name: 🖥️ GUI & API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - run: |
          sudo apt-get update && sudo apt-get install -y xvfb python3-tk
          pip install pytest customtkinter fastapi uvicorn httpx pydantic matplotlib
      - name: GUI tests
        run: xvfb-run -a pytest src/extension/GUI/tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: API tests
        run: pytest src/extension/api/tests/test_api.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ──────────────────────────────────────────────────────────────────────────────
  # DOCKER BUILD & SCAN
  # ──────────────────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: agentic-testing:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: agentic-testing:latest
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
          ignore-unfixed: true

      - name: Trivy SARIF
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: agentic-testing:latest
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy.sarif }
